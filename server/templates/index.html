<!DOCTYPE html>
<html lang="ja">

<head>
<meta charset="UTF-8">
<title>M5 Servo Controller</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body{
    font-family:sans-serif;
    padding:30px;
}

button{
    width:180px;
    height:50px;
    margin:10px;
    font-size:18px;
}

input{
    width:120px;
    font-size:20px;
}

.log{
    margin-top:20px;
    padding:12px;
    background:#f2f2f2;
    white-space:pre-wrap;
}

.logTableWrap{
    margin-top:20px;
    overflow-x:auto;
}

table.logTable{
    width:100%;
    border-collapse:collapse;
    font-size:14px;
    background:#fff;
}

table.logTable th,
table.logTable td{
    border:1px solid #ccc;
    padding:6px 10px;
    text-align:left;
    white-space:nowrap;
}

table.logTable th{
    background:#e8f4ff;
}

table.logTable tbody tr:nth-child(even){
    background:#f7f7f7;
}

.userbox{
    padding:15px;
    margin-bottom:20px;
    background:#e8f4ff;
}

#loginArea{
    display:none;
}

#controlArea{
    display:none;
}
</style>

</head>

<body>

<h1>M5Stack Servo Controller</h1>

<!-- =========================
     ログイン画面
========================= -->
<div id="loginArea" class="userbox">

    <h2>ログイン</h2>

    <p id="loginStatus">
        Googleアカウントでログインしてください。
    </p>

    <button onclick="googleLogin()">
        Googleでログイン
    </button>

</div>


<!-- =========================
     コントロール画面
========================= -->
<div id="controlArea">

    <div class="userbox">

        <p id="userInfo">
            ログイン確認中...
        </p>

        <button onclick="logout()">
            ログアウト
        </button>

    </div>

    <p>
        角度:
        <input type="number" id="angle" value="180">
    </p>

    <p>
        時間(ms):
        <input type="number" id="duration" value="500">
    </p>

    <button onclick="sendServo()">
        送信
    </button>

    <button onclick="lockServo()">
        LOCK
    </button>

    <button onclick="openServo()">
        OPEN
    </button>

    <p id="status">
        接続確認中...
    </p>

    <h2>鍵の状態</h2>

    <div id="lockStatus" class="log">
        状態取得中...
    </div>

    <h2>結果</h2>

    <div id="result" class="log">
        まだ操作していません
    </div>

    <h2>最近のログ（最新50件・全履歴はDBに永久保存）</h2>

    <button onclick="loadLogs()">
        ログ更新
    </button>

    <div class="logTableWrap">
        <table class="logTable">
            <thead>
                <tr>
                    <th>ID</th>
                    <th>日時</th>
                    <th>ユーザー</th>
                    <th>メール</th>
                    <th>操作</th>
                    <th>角度</th>
                    <th>時間(ms)</th>
                    <th>結果</th>
                    <th>IPアドレス</th>
                </tr>
            </thead>
            <tbody id="logsTableBody">
                <tr><td colspan="9">ログ未取得</td></tr>
            </tbody>
        </table>
    </div>

</div>


<script>

// =========================
// Supabase設定
// =========================

const SUPABASE_URL =
"{{ supabase_url }}";

const SUPABASE_KEY =
"{{ supabase_anon_key }}";

const APP_URL =
"{{ app_url }}";

const supabaseClient =
window.supabase.createClient(
    SUPABASE_URL,
    SUPABASE_KEY,
    {
        auth: {
            detectSessionInUrl: true,
            persistSession: true,
            autoRefreshToken: true
        }
    }
);

// =========================
// Googleログイン
// =========================

async function googleLogin() {

    document.getElementById("loginStatus").innerText =
        "Googleログイン画面へ移動中...";

    const { data, error } =
        await supabaseClient.auth.signInWithOAuth({
            provider: "google",
            options: {
                redirectTo: APP_URL
            }
        });

    if(error){
        console.error("Googleログインエラー:", error);

        document.getElementById("loginStatus").innerText =
            "ログインエラー: " + error.message;

        alert("Googleログインエラー: " + error.message);
        return;
    }

    console.log("Googleログイン処理:", data);
}


// =========================
// ログアウト
// =========================

async function logout() {

    await supabaseClient.auth.signOut();

    location.reload();

}


// =========================
// 現在ユーザー取得
// =========================

async function getCurrentUser() {

    const {
        data: { user },
        error
    } = await supabaseClient.auth.getUser();

    if(error){
        console.error("ユーザー取得エラー:", error);
        return null;
    }

    return user;
}


// =========================
// 認証ヘッダー取得
// =========================

async function getAuthHeaders() {

    const {
        data: { session }
    } = await supabaseClient.auth.getSession();

    if(!session){
        return {};
    }

    return {
        "Authorization": `Bearer ${session.access_token}`
    };
}


// =========================
// 画面切り替え
// =========================

async function checkUser() {

    const user = await getCurrentUser();

    if(user){

        showControlArea(user);

    }else{

        showLoginArea();

    }
}


// =========================
// ログイン画面表示
// =========================

function showLoginArea() {

    document.getElementById("loginArea").style.display =
        "block";

    document.getElementById("controlArea").style.display =
        "none";

    document.getElementById("loginStatus").innerText =
        "Googleアカウントでログインしてください。";

    if(lockStatusTimer){
        clearInterval(lockStatusTimer);
        lockStatusTimer = null;
    }
}


// =========================
// コントロール画面表示
// =========================

async function showControlArea(user) {

    document.getElementById("loginArea").style.display =
        "none";

    document.getElementById("controlArea").style.display =
        "block";

    const name =
        user.user_metadata.name || "名前なし";

    document.getElementById("userInfo").innerText =
        `ログイン中 : ${name} (${user.email})`;

    document.getElementById("status").innerText =
        "権限を確認中...";

    const allowed = await verifyAccess();

    if(!allowed){
        return;
    }

    document.getElementById("status").innerText =
        "Google認証済み。操作できます。";

    loadLogs();
    loadLockStatus();
    startLockStatusPolling();
}


// =========================
// 操作権限の確認
// =========================

async function verifyAccess() {

    try{

        const response =
            await fetch("/api/whoami", {
                headers: await getAuthHeaders()
            });

        if(response.ok){
            return true;
        }

        const result =
            await response.json();

        alert(
            result.message ||
            "このアカウントには操作権限がありません。"
        );

    }catch(error){

        alert(
            "権限確認中にエラーが発生しました: " +
            error.toString()
        );
    }

    await logout();
    return false;
}


// =========================
// 鍵状態表示
// =========================

const LOCK_STATE_TEXT = {
    "UNLOCK": "開錠 (UNLOCK)",
    "LOCK": "施錠 (LOCK)",
    "MIDDLE": "中間 (MIDDLE)",
    "ERROR": "異常 (ERROR)",
    "unknown": "不明 (状態未受信)"
};

let lockStatusTimer = null;

async function loadLockStatus(){

    try{

        const response =
            await fetch("/api/status", {
                headers: await getAuthHeaders()
            });

        const status =
            await response.json();

        const label =
            LOCK_STATE_TEXT[status.label] ||
            status.label ||
            "不明";

        const updatedAt =
            status.updated_at || "未受信";

        document.getElementById("lockStatus").innerText =
            `状態: ${label}\n最終更新: ${updatedAt}`;

    }catch(error){

        document.getElementById("lockStatus").innerText =
            error.toString();

    }
}


function startLockStatusPolling(){

    if(lockStatusTimer){
        return;
    }

    lockStatusTimer =
        setInterval(loadLockStatus, 3000);
}


// =========================
// Flask API送信
// =========================

async function sendServoCommand(
    angle,
    duration,
    action
){

    const user = await getCurrentUser();

    if(!user){

        alert("先にGoogleログインしてください");

        showLoginArea();

        return;
    }

    const response = await fetch(
        "/api/servo",
        {
            method:"POST",
            headers:{
                "Content-Type":"application/json",
                ...(await getAuthHeaders())
            },
            body:JSON.stringify({
                action:action,
                angle:angle,
                duration:duration
            })
        }
    );

    const result =
        await response.json();

    document.getElementById("result").innerText =
        JSON.stringify(result,null,2);

    loadLogs();
}


// =========================
// 任意角度
// =========================

function sendServo(){

    const angle =
        parseInt(
            document.getElementById("angle").value
        );

    const duration =
        parseInt(
            document.getElementById("duration").value
        );

    sendServoCommand(
        angle,
        duration,
        "CUSTOM"
    );
}


// =========================
// LOCK
// =========================

function lockServo(){

    sendServoCommand(
        0,
        500,
        "LOCK"
    );
}


// =========================
// OPEN
// =========================

function openServo(){

    sendServoCommand(
        180,
        500,
        "OPEN"
    );
}


// =========================
// HTMLエスケープ
// =========================

function escapeHtml(value){

    return String(value ?? "")
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#39;");
}


// =========================
// ログ取得
// =========================

async function loadLogs(){

    const tbody =
        document.getElementById("logsTableBody");

    try{

        const response =
            await fetch("/logs", {
                headers: await getAuthHeaders()
            });

        const logs =
            await response.json();

        if(!Array.isArray(logs) || logs.length === 0){

            tbody.innerHTML =
                '<tr><td colspan="9">ログがありません</td></tr>';

            return;
        }

        tbody.innerHTML = logs.map(function(log){

            return `
                <tr>
                    <td>${escapeHtml(log.id)}</td>
                    <td>${escapeHtml(log.timestamp)}</td>
                    <td>${escapeHtml(log.user_name)}</td>
                    <td>${escapeHtml(log.user_email)}</td>
                    <td>${escapeHtml(log.action)}</td>
                    <td>${escapeHtml(log.angle)}</td>
                    <td>${escapeHtml(log.duration)}</td>
                    <td>${escapeHtml(log.result)}</td>
                    <td>${escapeHtml(log.ip_address)}</td>
                </tr>
            `;

        }).join("");

    }catch(error){

        tbody.innerHTML =
            `<tr><td colspan="9">${escapeHtml(error.toString())}</td></tr>`;

    }
}


// =========================
// 認証状態変化を監視
// =========================

supabaseClient.auth.onAuthStateChange(
    async function(event, session){

        console.log("Auth state changed:", event);

        if(session && session.user){

            showControlArea(session.user);

        }else{

            showLoginArea();

        }
    }
);


// =========================
// 起動時
// =========================

checkUser();

</script>

</body>
</html>
